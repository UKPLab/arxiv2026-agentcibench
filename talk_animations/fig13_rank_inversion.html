<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 13 — Rank Inversion Race</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#fff; color:#0f172a; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; overflow:hidden; }
  h1 { font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#64748b; }
  canvas { display:block; border:1px solid #e2e8f0; border-radius:8px; background:#fff; }
  .ctrl { display:flex; align-items:center; gap:12px; margin-top:10px; }
  .ctrl-btn { background:#f8fafc; border:1px solid #e2e8f0; color:#374151; padding:7px 18px; border-radius:6px; font-size:12px; cursor:pointer; }
  .ctrl-btn:hover { background:#f1f5f9; }
  .ctrl-btn.primary { background:#2563eb; color:#fff; border-color:#2563eb; }
  .ctrl-btn.primary:hover { background:#1d4ed8; }
  .step-info { display:flex; flex-direction:column; align-items:center; min-width:240px; gap:2px; }
  .step-lbl { font-size:11px; color:#2563eb; letter-spacing:.04em; height:15px; text-align:center; }
  .step-num { font-size:10px; color:#cbd5e1; }
  .key-hint { font-size:10px; color:#cbd5e1; }
</style>
</head>
<body>
<h1>Rank Inversion Race · Capability vs. Safety</h1>
<canvas id="c" width="760" height="510"></canvas>
<div class="ctrl">
  <button class="ctrl-btn" id="backBtn">← Back</button>
  <div class="step-info">
    <div class="step-lbl" id="stepLbl">Press Next or → to begin</div>
    <div class="step-num" id="stepNum">0 / 4</div>
  </div>
  <button class="ctrl-btn primary" id="nextBtn">Next →</button>
</div>
<div class="key-hint">Space / → to advance &nbsp;·&nbsp; ← to go back</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const FC={anthropic:'#7c3aed',openai:'#2563eb',google:'#059669',xai:'#b45309',alibaba:'#dc2626',deepseek:'#4338ca',moonshot:'#ea580c',minimax:'#be185d',zhipu:'#0284c7'};

const byU=[
  {name:"Gemini-Pro",  u:96.6,leng:98.3,f:'google'},
  {name:"Gemini-Flash",u:88.0,leng:94.0,f:'google'},
  {name:"Qwen-35B",    u:82.9,leng:77.6,f:'alibaba'},
  {name:"Qwen-Max",    u:82.1,leng:97.4,f:'alibaba'},
  {name:"Opus 4.7",    u:81.2,leng:14.0,f:'anthropic'},
  {name:"Grok-4.3",    u:78.6,leng:91.5,f:'xai'},
  {name:"Gemma-26B",   u:74.4,leng:69.3,f:'google'},
  {name:"MiniMax",     u:68.4,leng:63.6,f:'minimax'},
  {name:"GPT-OSS",     u:65.8,leng:78.5,f:'openai'},
  {name:"DeepSeek",    u:64.1,leng:85.1,f:'deepseek'},
  {name:"GLM-5.1",     u:57.3,leng:89.3,f:'zhipu'},
  {name:"Sonnet 4.6",  u:52.1,leng:54.5,f:'anthropic'},
  {name:"5.4-mini",    u:52.1,leng:65.1,f:'openai'},
  {name:"GPT-5.4",     u:44.4,leng:32.4,f:'openai'},
  {name:"Kimi-K2.6",   u:43.6,leng:80.2,f:'moonshot'},
];
const byD=[...byU].sort((a,b)=>a.leng-b.leng);
const discRank={};
byD.forEach((ag,i)=>discRank[ag.name]=i);

const N=15,ROW_H=(H-110)/N;
const LX=80,RX=W-80,MID=W/2;

// State
const state={leftLabels:0,lines:0,shuffle:0,highlights:0};
const PHASES=[
  {label:'', targets:{}},
  {label:'Agents ranked by task utility', targets:{leftLabels:1}},
  {label:'Connecting the two orderings', targets:{lines:1}},
  {label:'Reshuffling by disclosure safety…', targets:{shuffle:1}},
  {label:'Key inversions: top utility ≠ top safety', targets:{highlights:1}},
];
const MAX_PHASE=PHASES.length-1;
let phase=0;
const target={...state};
const anims={};
const ANIM_DUR=800;

function ease(t){return t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;}
function setPhase(p){
  phase=Math.max(0,Math.min(p,MAX_PHASE));
  const now=performance.now();
  const acc={...state};
  for(let i=0;i<=phase;i++) Object.assign(acc,PHASES[i].targets);
  Object.keys(acc).forEach(k=>{
    if(Math.abs(acc[k]-state[k])>0.001)
      anims[k]={from:state[k],to:acc[k],start:now,dur:k==='shuffle'?1200:ANIM_DUR};
    target[k]=acc[k];
  });
  document.getElementById('stepLbl').textContent=PHASES[phase].label;
  document.getElementById('stepNum').textContent=phase+' / '+MAX_PHASE;
  document.getElementById('backBtn').disabled=phase===0;
  document.getElementById('nextBtn').disabled=phase===MAX_PHASE;
}
function updateAnims(now){
  Object.keys(anims).forEach(k=>{
    const a=anims[k];
    const p=Math.min((now-a.start)/a.dur,1);
    state[k]=a.from+(a.to-a.from)*ease(p);
    if(p>=1){state[k]=a.to; delete anims[k];}
  });
}

function rowY(r){return 72+r*ROW_H+ROW_H/2;}

function draw(){
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

  // Headers
  ctx.save(); ctx.globalAlpha=state.leftLabels;
  ctx.font='bold 12px -apple-system,sans-serif'; ctx.textAlign='center';
  ctx.fillStyle='#2563eb'; ctx.fillText('CAPABILITY RANK',LX+60,46);
  ctx.fillStyle='#94a3b8'; ctx.font='10px -apple-system,sans-serif'; ctx.fillText('↑ Utility rate',LX+60,60);
  ctx.restore();

  ctx.save(); ctx.globalAlpha=Math.min(state.shuffle*2,1);
  ctx.font='bold 12px -apple-system,sans-serif'; ctx.textAlign='center';
  ctx.fillStyle='#16a34a'; ctx.fillText('DISCLOSURE RANK',RX-60,46);
  ctx.fillStyle='#94a3b8'; ctx.font='10px -apple-system,sans-serif'; ctx.fillText('↓ Engaged leakage',RX-60,60);
  ctx.restore();

  byU.forEach((ag,uRank)=>{
    const dRank=discRank[ag.name];
    const col=FC[ag.f];
    const inv=dRank!==uRank;
    const bigInv=Math.abs(dRank-uRank)>=8;
    const ly=rowY(uRank);
    const ry=ly+(rowY(dRank)-ly)*state.shuffle;

    // Left label
    ctx.save(); ctx.globalAlpha=state.leftLabels;
    ctx.fillStyle=bigInv?col:'#374151';
    ctx.font=`${bigInv?'bold ':''} 11px -apple-system,sans-serif`; ctx.textAlign='left';
    ctx.fillText(`${uRank+1}. ${ag.name}`,LX,ly+4);
    ctx.fillStyle='#94a3b8'; ctx.font='10px -apple-system,sans-serif';
    ctx.fillText(`${ag.u}%`,LX+132,ly+4);
    ctx.restore();

    // Connector
    if(state.lines>0){
      ctx.save(); ctx.globalAlpha=state.lines*(inv?0.8:0.18);
      ctx.strokeStyle=inv?(bigInv?'#dc2626':col):'#e2e8f0';
      ctx.lineWidth=bigInv?2:1;
      ctx.beginPath(); ctx.moveTo(LX+148,ly);
      ctx.bezierCurveTo(MID,ly,MID,ry,RX-148,ry);
      ctx.stroke(); ctx.restore();
    }

    // Right label
    if(state.shuffle>0){
      ctx.save(); ctx.globalAlpha=Math.min(state.shuffle*2,1);
      ctx.fillStyle=bigInv?col:'#374151';
      ctx.font=`${bigInv?'bold ':''} 11px -apple-system,sans-serif`; ctx.textAlign='right';
      ctx.fillText(`${dRank+1}. ${ag.name}`,RX,ry+4);
      ctx.fillStyle='#94a3b8'; ctx.font='10px -apple-system,sans-serif'; ctx.textAlign='right';
      ctx.fillText(`${ag.leng}%`,RX-132,ry+4);
      ctx.restore();
    }
  });

  // Highlight callouts
  if(state.highlights>0){
    [{name:"Gemini-Pro",msg:"Rank 1→15: top utility, worst disclosure"},
     {name:"Opus 4.7",  msg:"Rank 5→1: top capability AND top safety"}
    ].forEach(({name,msg})=>{
      const uR=byU.findIndex(a=>a.name===name);
      const dR=discRank[name];
      const ag=byU[uR]; const col=FC[ag.f];
      ctx.save(); ctx.globalAlpha=state.highlights;
      ctx.fillStyle=col; ctx.font='bold 10px -apple-system,sans-serif'; ctx.textAlign='center';
      ctx.fillText(msg,MID,rowY(dR)-16);
      ctx.restore();
    });
  }
}

function loop(now){updateAnims(now); draw(); requestAnimationFrame(loop);}
document.getElementById('nextBtn').onclick=()=>setPhase(phase+1);
document.getElementById('backBtn').onclick=()=>setPhase(phase-1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();setPhase(phase+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();setPhase(phase-1);}
});
setPhase(0);
requestAnimationFrame(loop);
</script>
</body>
</html>
